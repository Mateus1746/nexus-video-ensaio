name: Nexus Render

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - name: Setup rclone
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq rclone
          mkdir -p ~/.config/rclone
          echo "${{ secrets.RCLONE_CONF }}" > ~/.config/rclone/rclone.conf

      - name: Pull audio from Drive
        run: |
          rclone sync "gdrive:nexus_pipeline/audio_ready/ensaio" \
            pipeline/sync_drive/audio_ready/ -P
          rclone sync "gdrive:nexus_pipeline/custom_voices" \
            pipeline/sync_drive/custom_voices/ -P

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install FFmpeg
        run: sudo apt-get install -y -qq ffmpeg

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: pip install uv

      - name: Render all scenes
        run: |
          mkdir -p pipeline/sync_drive/exports
          find pipeline/sync_drive/audio_ready -name "*.wav" | while read wav; do
            rel=$(echo "$wav" | sed 's|.*/audio_ready/||')
            factory=$(echo "$rel" | cut -d/ -f1)
            scene=$(echo "$rel" | cut -d/ -f2)
            scene_id=$(basename "$wav" .wav)
            echo "🎥 Rendering: $factory / $scene_id"
            uv run python conductor/render_headless.py "$factory" "$scene" || echo "⚠️ Failed: $factory/$scene_id"
          done

      - name: Upload MP4 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: renders-ensaio
          path: pipeline/sync_drive/exports/*.mp4
          retention-days: 90
