<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemma 4 - Fluxo Matemático Contínuo</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #010103; }
        canvas { display: block; touch-action: none; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        
        const spriteCanvas = document.createElement('canvas');
        const sCtx = spriteCanvas.getContext('2d');
        const spriteSize = 12;
        
        let width, height, halfW, halfH;
        let particles = [];
        const particleCount = 1500;

        function createParticleSprite() {
            spriteCanvas.width = spriteSize;
            spriteCanvas.height = spriteSize;
            const gradient = sCtx.createRadialGradient(6, 6, 0, 6, 6, 6);
            gradient.addColorStop(0, 'rgba(255, 255, 255, 1)');
            gradient.addColorStop(0.4, 'rgba(60, 140, 255, 0.6)');
            gradient.addColorStop(1, 'rgba(0, 40, 80, 0)');
            sCtx.fillStyle = gradient;
            sCtx.fillRect(0, 0, spriteSize, spriteSize);
        }

        class Particle {
            constructor() {
                this.init(true);
            }

            init(randomizeRadius = false) {
                // Distribuição circular contínua, sem divisões por quadrante
                const angle = Math.random() * Math.PI * 2;
                const radius = randomizeRadius ? Math.random() * (Math.max(width, height)) : 10;
                
                this.x = halfW + Math.cos(angle) * radius;
                this.y = halfH + Math.sin(angle) * radius;
                this.vx = 0;
                this.vy = 0;
                this.size = 0.5 + Math.random() * 1.5;
            }

            update() {
                const dx = this.x - halfW;
                const dy = this.y - halfH;
                const dist = Math.sqrt(dx * dx + dy * dy) || 1;
                const angle = Math.atan2(dy, dx);

                // Vetores normais (Direção Radial e Tangencial)
                const vRadialX = dx / dist;
                const vRadialY = dy / dist;
                const vTanX = -vRadialY;
                const vTanY = vRadialX;

                // Campo Vetorial Contínuo
                // 1. Força que empurra as partículas para formar as 4 "rodovias" principais (cross)
                const axisAttraction = -Math.sin(angle * 4) * 0.8;
                
                // 2. Modulação por distância para criar o padrão em losango (diamond web)
                const waveDistortion = Math.sin(dist * 0.015) * 0.4;

                // Cálculo de aceleração
                const speed = 1.2;
                const accX = (vRadialX * speed + vTanX * (axisAttraction + waveDistortion)) * 0.05;
                const accY = (vRadialY * speed + vTanY * (axisAttraction + waveDistortion)) * 0.05;

                // Integração de Euler com atrito
                this.vx = (this.vx + accX) * 0.96;
                this.vy = (this.vy + accY) * 0.96;
                
                this.x += this.vx;
                this.y += this.vy;

                // Reciclagem da partícula se sair das bordas
                if (this.x < 0 || this.x > width || this.y < 0 || this.y > height) {
                    this.init(false);
                }
            }
        }

        function setup() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            halfW = width / 2;
            halfH = height / 2;

            particles = [];
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }
            createParticleSprite();
        }

        function draw() {
            // Efeito de rastro visual via opacidade do background
            ctx.fillStyle = 'rgba(1, 1, 3, 0.15)';
            ctx.fillRect(0, 0, width, height);

            ctx.save();
            ctx.globalCompositeOperation = 'lighter';
            
            const opacity = 0.55;
            ctx.globalAlpha = opacity;

            // Renderização de passagem única em tela cheia. Nenhum espelhamento artificial.
            for (let i = 0; i < particles.length; i++) {
                const p = particles[i];
                p.update();
                ctx.drawImage(spriteCanvas, p.x - p.size, p.y - p.size, p.size * 2, p.size * 2);
            }

            ctx.restore();
            requestAnimationFrame(draw);
        }

        window.addEventListener('resize', setup);
        window.onload = () => {
            setup();
            draw();
        };
    </script>
</body>
</html>
