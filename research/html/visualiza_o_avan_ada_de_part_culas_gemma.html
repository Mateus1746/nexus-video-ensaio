<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemma 4 - Fluxo Avançado</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000105; }
        canvas { display: block; touch-action: none; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        
        // Sistema de Sprites Multi-cor para evitar cálculos de gradiente por frame
        const sprites = [];
        const colors = [
            { light: '#ffffff', core: '#4fc3f7', glow: 'rgba(79, 195, 247, 0)' }, // Ciano
            { light: '#e1f5fe', core: '#0288d1', glow: 'rgba(2, 136, 209, 0)' },  // Azul
            { light: '#ffffff', core: '#ffffff', glow: 'rgba(255, 255, 255, 0)' } // Branco
        ];
        
        let width, height, halfW, halfH;
        let particles = [];
        const particleCount = 1800;

        function createSprites() {
            const size = 16;
            colors.forEach(col => {
                const sCanvas = document.createElement('canvas');
                sCanvas.width = size;
                sCanvas.height = size;
                const sCtx = sCanvas.getContext('2d');
                const grad = sCtx.createRadialGradient(size/2, size/2, 0, size/2, size/2, size/2);
                grad.addColorStop(0, col.light);
                grad.addColorStop(0.2, col.core);
                grad.addColorStop(1, col.glow);
                sCtx.fillStyle = grad;
                sCtx.fillRect(0, 0, size, size);
                sprites.push(sCanvas);
            });
        }

        class Particle {
            constructor() {
                this.init(true);
            }

            init(isFirstLoad = false) {
                const angle = Math.random() * Math.PI * 2;
                const radius = isFirstLoad ? Math.random() * Math.max(width, height) : 5;
                
                this.x = halfW + Math.cos(angle) * radius;
                this.y = halfH + Math.sin(angle) * radius;
                this.z = 0.5 + Math.random() * 1.5; // Fator de profundidade
                this.vx = 0;
                this.vy = 0;
                this.sprite = sprites[Math.floor(Math.random() * sprites.length)];
                this.baseSize = 0.4 + Math.random() * 1.2;
                this.noiseOffset = Math.random() * 1000;
            }

            update() {
                const dx = this.x - halfW;
                const dy = this.y - halfH;
                const dist = Math.sqrt(dx * dx + dy * dy) || 1;
                const angle = Math.atan2(dy, dx);

                // Forças de campo
                const vRadialX = dx / dist;
                const vRadialY = dy / dist;
                const vTanX = -vRadialY;
                const vTanY = vRadialX;

                // Atracção das Rodovias (4 eixos principais + distorção harmónica)
                const highwayAttraction = -Math.sin(angle * 4) * 0.9;
                const focalPower = Math.cos(dist * 0.01 + this.noiseOffset) * 0.3;

                const speedBase = 1.4 * this.z;
                const accX = (vRadialX * speedBase + vTanX * (highwayAttraction + focalPower)) * 0.06;
                const accY = (vRadialY * speedBase + vTanY * (highwayAttraction + focalPower)) * 0.06;

                this.vx = (this.vx + accX) * 0.95;
                this.vy = (this.vy + accY) * 0.95;
                
                this.x += this.vx;
                this.y += this.vy;

                if (this.x < -50 || this.x > width + 50 || this.y < -50 || this.y > height + 50) {
                    this.init(false);
                }
            }

            draw() {
                const size = this.baseSize * this.z;
                // Simula Bloom atenuando conforme a distância do centro
                ctx.globalAlpha = Math.min(1, (this.vx * this.vx + this.vy * this.vy) * 2);
                ctx.drawImage(this.sprite, this.x - size, this.y - size, size * 2, size * 2);
            }
        }

        function setup() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            halfW = width / 2;
            halfH = height / 2;
            createSprites();
            particles = Array.from({ length: particleCount }, () => new Particle());
        }

        function animate() {
            // Persistência de rastro para fluidez de movimento
            ctx.fillStyle = 'rgba(0, 1, 5, 0.18)';
            ctx.fillRect(0, 0, width, height);

            ctx.save();
            ctx.globalCompositeOperation = 'lighter';
            
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
            }

            ctx.restore();
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', setup);
        window.onload = () => {
            setup();
            animate();
        };
    </script>
</body>
</html>
